<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple Blog Post</h1>
    <div class="container">
        <h2>Create a New Post</h2>
        <input type="text" name="postTitle" id="postTitle" placeholder="Post Title"><br>
        <input type="text" name="postImage" id="postImage" placeholder="Image URL(optinal)"><br>
        <textarea name="postContent" id="postContent" placeholder="Post Content"></textarea><br>
        <button id="AddPost">Add Post</button>
    </div>
    <!-- Display Posts -->
        <h2>All Posts</h2>
        <div id="postContainer">

        </div>
    <script src="main.js"></script>
</body>
</html>
